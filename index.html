<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩家档案 - Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 30px;
            line-height: 1.8;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        .main-title {
            font-size: 28px;
            color: #ff6a00;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .intro-text {
            font-size: 16px;
            color: #555555;
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 22px;
            color: #007bff;
            margin: 30px 0 15px;
            text-align: center;
        }
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .badge-group a {
            text-decoration: none; /* 去除链接下划线 */
        }
        .badge-group img {
            height: 28px;
            cursor: pointer; /* 鼠标悬停显示手型 */
            transition: transform 0.2s; /* 点击动画效果 */
        }
        .badge-group img:hover {
            transform: scale(1.05); /* 悬停放大效果 */
        }
        .status-list {
            text-align: center;
            font-size: 16px;
            color: #333333;
            margin-bottom: 30px;
        }
        .status-list li {
            margin: 8px 0;
            list-style: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">🔥 MTR.Minecraft</h1>

        <p class="intro-text">
            专注Minecraft | 佛系游玩 | 享受游戏乐趣🎮<br>
            畅游Minecraft，放空身心，快乐至上；<br>
            游戏即是生活的调味剂。
        </p>

        <h2 class="section-title">🎯 游戏领域</h2>
        <div class="badge-group">
            <!-- 为单机游戏标签添加链接跳转 -->
            <a href="https://play.mcjs.cc/" target="_blank">
                <img src="https://img.shields.io/badge/单机游戏-6A0DAD?style=for-the-badge&logo=gamepad&logoColor=green" alt="单机游戏">
            </a>
            <!-- 休闲娱乐标签添加B站视频跳转 -->
            <a href="https://www.bilibili.com/video/BV1GJ411x7h7?vd_source=988bbc5a5f57f8162401b5b3e0a11c90" target="_blank">
                <img src="https://img.shields.io/badge/休闲娱乐-00BFFF?style=for-the-badge&logo=discord&logoColor=green" alt="休闲娱乐">
            </a>
            <!-- 生存建造标签添加B站视频跳转 -->
            <a href="https://www.bilibili.com/video/BV1GJ411x7h7?vd_source=988bbc5a5f57f8162401b5b3e0a11c90" target="_blank">
                <img src="https://img.shields.io/badge/生存建造-32CD32?style=for-the-badge&logo=minecraft&logoColor=green" alt="生存建造">
            </a>
        </div>

        <h2 class="section-title">🎮 玩家日常状态</h2>
        <ul class="status-list">
            <li>⏰ 游玩时间：闲暇时刻，尽情畅玩</li>
            <li>🎁 游戏目标：畅玩 Minecraft</li>
            <li>💬 互动邀约：欢迎各路游戏好友一起交流、组队游玩</li>
        </ul>
    </div>
</body>
</html>
